name: cloud-deploy-release (identity-access-service)

# Supervisor-gate pilot — auto-dispatches a Cloud Deploy release on push
# to feat/thet-integration. Release advances through staging then pauses
# at identity-access-service-prod pending supervisor approval (because
# var.enforce_prod_approval["identity-access-service"] = true in
# IaC_Smoke/variables.tf).
#
# image_tag=latest assumes the image is already in Artifact Registry
# (pushed by docker-build.yml or tagged manually). The central
# release-service.yml verifies the image before creating the release.

on:
  push:
    branches: [feat/thet-integration]
  workflow_dispatch:

jobs:
  dispatch-release:
    name: create cloud deploy release
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: assessorflow/IaC_Smoke/.github/workflows/release-service.yml@feat/thet-integration
    permissions:
      contents: read
      id-token: write
    with:
      service: identity-access-service
      image_tag: latest
    secrets: inherit
