name: CI — Identity Access Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  SERVICE_NAME: identity-access-service

jobs:
  # ================================================================
  # Stage 1: Build + Unit/Integration Tests
  # ================================================================
  test:
    name: Build + Test (46 tests)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run all tests (unit + integration)
        run: mvn test -Dspring.profiles.active=test -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  # ================================================================
  # Stage 2: SAST — CodeQL + SpotBugs
  # ================================================================
  sast-codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build for CodeQL
        run: mvn clean compile -DskipTests -B

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:java
        continue-on-error: true

  sast-spotbugs:
    name: SAST — SpotBugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run SpotBugs
        run: mvn compile spotbugs:check -B
        continue-on-error: true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugs.html
          if-no-files-found: ignore

  # ================================================================
  # Stage 3: SCA — OWASP Dependency-Check
  # ================================================================
  sca:
    name: SCA — OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache NVD Database
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository/org/owasp/dependency-check-data
            ~/.dependency-check
          key: nvd-db-${{ github.run_id }}
          restore-keys: nvd-db-

      - name: Run OWASP Dependency-Check
        run: mvn dependency-check:check -B
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7

  # ================================================================
  # Stage 4: Secret Scanning
  # ================================================================
  secret-scan:
    name: Secret Scanning — TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  # ================================================================
  # Stage 5: Build Container + Trivy Scan
  # ================================================================
  build:
    name: Build + Container Scan
    runs-on: ubuntu-latest
    needs: [test, sast-spotbugs, sca, secret-scan]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "CRITICAL"