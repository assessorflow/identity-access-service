name: Docker Build and Push

# Builds the identity-access-service container and pushes to Artifact
# Registry. Fires on push to `main` and `feat/thet-integration`.
# On `feat/thet-integration`, the pilot also dispatches a Cloud Deploy
# release via iac-smoke/release-service.yml using the just-built SHA tag
# — this is the supervisor-gate pilot chain (AF-199).
#
# Auth: Workload Identity Federation via the `github-actions` SA in
# thet-integration-af (Track C #1). Replaces the old GCP_SA_KEY credential
# path which pointed at the retired aflow-491809 project.
#
# Image path:
#   asia-southeast1-docker.pkg.dev/thet-integration-af/assessorflow/identity-access-service:<tag>
# where <tag> = input.image_tag (dispatch) or github.sha (push).

on:
  push:
    branches:
      - main
      - feat/thet-integration
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (defaults to commit SHA)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: thet-integration-af
  AR_REGION: asia-southeast1
  AR_REPO: assessorflow
  IMAGE_NAME: identity-access-service

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/459087601514/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions@thet-integration-af.iam.gserviceaccount.com

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests -B

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_REGION }}-docker.pkg.dev --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.ci
          push: true
          tags: |
            ${{ env.AR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.AR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Image built + pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Path: \`${{ env.AR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag:  \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Also tagged: \`latest\`" >> "$GITHUB_STEP_SUMMARY"

  # Supervisor-gate pilot: dispatch a Cloud Deploy release with the just-
  # built SHA tag so the feat/thet-integration code is what's in flight.
  # Only fires on push to feat/thet-integration (not main, not PR,
  # not dispatch).
  dispatch-release:
    name: create cloud deploy release
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/thet-integration' && success()
    uses: assessorflow/iac-smoke/.github/workflows/release-service.yml@feat/thet-integration
    permissions:
      contents: read
      id-token: write
    with:
      service: identity-access-service
      image_tag: ${{ needs.build-and-push.outputs.image_tag }}
    secrets: inherit
