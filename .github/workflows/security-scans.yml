name: Security Scans

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: OWASP Dependency-Check (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get Date for Cache Key
        id: date
        run: echo "week=$(date +%Y-W%W)" >> $GITHUB_OUTPUT

      - name: Cache NVD Database
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository/org/owasp/dependency-check-data
            ~/.dependency-check
          key: nvd-db-${{ steps.date.outputs.week }}
          restore-keys: nvd-db-

      - name: Run OWASP Dependency-Check
        run: mvn dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 1

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-json
          path: target/dependency-check-report.json
          retention-days: 1

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL database
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:java'
        continue-on-error: true

      - name: Upload CodeQL SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: /home/runner/work/identity-access-service/results/*.sarif
          retention-days: 1
        continue-on-error: true

  spotbugs:
    name: SpotBugs (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run SpotBugs analysis
        run: mvn compile spotbugs:check
        continue-on-error: true

      - name: Upload SpotBugs SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: target/spotbugsSarif.json
          category: 'spotbugs'
        continue-on-error: true

      - name: Upload SpotBugs reports
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            target/spotbugs.html
            target/spotbugs.xml
          retention-days: 1
          if-no-files-found: ignore
        continue-on-error: true

  trufflehog:
    name: TruffleHog (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: './'
