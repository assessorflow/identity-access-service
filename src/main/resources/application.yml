server:
  port: 8081

spring:
  application:
    name: identity-access-service
  profiles:
    active: dev
  config:
    import: sm://

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  jpa:

    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      repositories:
        enabled: false

  cloud:
    gcp:
      project-id: accessorflow
      secretmanager:
        enabled: true

# gRPC server
grpc:
  server:
    port: 9090

# JWT (RS256) — keys from GCP Secret Manager
app:
  jwt:
    private-key-content: ${sm://projects/accessorflow/secrets/jwt-private-key}
    public-key-content: ${sm://projects/accessorflow/secrets/jwt-public-key}
    issuer: assessorflow
    audience: assessorflow-api
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000   # 7 days

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
