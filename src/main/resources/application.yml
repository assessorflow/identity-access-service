server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: identity-access-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  # No default profile — set explicitly per environment:
  # Local: -Dspring.profiles.active=dev | Docker: SPRING_PROFILES_ACTIVE=docker | GKE: SPRING_PROFILES_ACTIVE=prod
  config:
    import: sm://

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  jpa:

    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      repositories:
        enabled: false

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:aflow-491809}
      secretmanager:
        enabled: true

# gRPC server
grpc:
  server:
    port: 9090

# JWT (RS256) — keys from GCP Secret Manager
app:
  jwt:
    private-key-content: ${sm://jwt-private-key}
    public-key-content: ${sm://jwt-public-key}
    issuer: assessorflow
    audience: assessorflow-api
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000   # 7 days
  # Google SSO — ID token exchange at POST /api/v1/auth/google
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    hosted-domain: ${GOOGLE_HOSTED_DOMAIN:}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
