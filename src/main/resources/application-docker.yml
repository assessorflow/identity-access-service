spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/identity_access_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  data:
    redis:
      host: redis
      port: 6379

logging:
  level:
    sg.edu.nus.iss.identity: INFO
